<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Video thumbnail placeholder</title>
  <desc id="desc">A retro television test screen waiting for a video thumbnail.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#191633"/>
      <stop offset="1" stop-color="#443765"/>
    </linearGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 7.5h8" stroke="#fff" stroke-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#scan)"/>
  <rect x="58" y="45" width="684" height="360" rx="18" fill="none" stroke="#ad9bda" stroke-width="4"/>
  <path d="M364 154l112 71-112 71z" fill="#ffd0e8" stroke="#2d2148" stroke-width="8"/>
  <text x="400" y="353" fill="#fff7dc" font-family="ui-monospace, monospace" font-size="24" font-weight="700" text-anchor="middle">VIDEO TAPE NOT INSTALLED</text>
  <circle cx="92" cy="82" r="9" fill="#ff8fc7"/>
  <circle cx="121" cy="82" r="9" fill="#fff08a"/>
</svg>
